<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkedin</title>
    <style>
        .button{
            height: 35px;
            font-weight: bold;
            border-radius: 18px;
            cursor: pointer;
        }
        #apply-button{
            background-color: rgb(89, 170, 252);
            color: white;
            border: none;
            width: 205px;
        }
        #save-button{
            background-color: white;
            color: rgb(89, 170, 252);
            width: 70px;
            border-width: 1px;
            border-color: rgb(89, 170, 252);
        }
        #apply-button:hover{
            background-color: rgb(10, 77, 143);
        }
        #save-button:hover{
            background-color: rgb(172, 209, 245);
            border-width: 2px;
            border-color: rgb(89,170,252);
        }
    </style>
</head>
<body>
    <button class="button" id="apply-button">Apply on company website</button>
    <button class="button" id="save-button">Save</button>
</body>
</html>
