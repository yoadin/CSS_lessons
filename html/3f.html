<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2g/Amazon mini mock</title>
    <style>
        a{
            color: rgb(3, 128, 150);
            transition: color 0.15s;
        }
        #price{
            color: rgb(0,118,0);
            font-weight: bold;
        }
        button{
            height: 30px;
            width: 100px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
        }

        #add-button{
            background-color: rgb(255,216,20);
        }
        #buy-button{
            background-color: rgb(255,164,28);
        }
        a:hover{
            color: orange
        }
        #add-button:hover{
            background-color: rgb(222, 188, 17);
        }
        #buy-button:hover{
            background-color: rgb(232, 142, 8);   
        }
        #add-button:active{
            background-color: rgba(255,216,20,0.675);
        }
        #buy-button:active{
            background-color:rgba(255, 164, 28, 0.61);
        }
    </style>
</head>
<body>
    <!--CSS added to 1g-->
    <a href="amazon.com">Back to Amazon</a>
    <h1>Nike Black Running shoes</h1>
    <p id="price">$39 - in stock.</p>
    <p>Free Delivery tomorrow</p>
    
    <button id="add-button">Add to Cart</button>
    <button id="buy-button">Buy Now</button>
</body>
</html>
