<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootStrap</title>
    <style>
        .button{
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        #getstarted-button{
            background-color: rgb(121,82,179);
            color: white;
            font-weight: bold;
            margin-right: 5px;
        }
        #download-button{
            background-color: rgb(221, 230, 237);
            font-weight: bold;
            color: rgb(142, 139, 155);
        }
         #getstarted-button:hover{
            background-color: rgb(65, 31, 117);
         }
        #download-button:hover{
            background-color: rgb(142, 139, 155);
            color: rgb(221, 230, 237);
        }
    </style>
</head>
<body>
    <button class="button" id="getstarted-button">Get Started</button>
    <button class="button" id="download-button">Download</button>
</body>
</html>
