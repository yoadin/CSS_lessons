<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4h</title>
    <style>
        button{
            background-color: lime;
            border-width: 1px;
            border-color: white;
            color: whitesmoke;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 5px;
            transition: box-shadow 0.25s, 
            padding 0.25s;
        }

        button:hover{
            box-shadow: 6px 6px 6px rgba(71, 71, 71, 0.724);
            padding: 15px 25px;
        }
        button:active{
            padding: 10px 16px;
        }
    </style>
</head>
<body>
    <button>Shadow</button>
</body>
</html>
