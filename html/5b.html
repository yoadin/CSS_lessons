<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Style</title>
    <style>
        .big-text{
            font-family: Arial;
            font-size: 30px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .sub-text{
            color: rgb(244, 22, 22);
            font-family: Arial;
            font-size: 18px;
            margin-top: 0;
            font-style: italic;
        }
    </style>
</head>
<body>
    <p class="big-text">Biggest Deals of the Year</p>
    <p class="sub-text">Sales end Tuesday</p>
</body>
</html>
