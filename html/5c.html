<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdana Font</title>
    <style>
        p{
            font-family: Verdana;
            margin-top: 0;
        }
        .tittle-text{
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .subtittle-text{
            font-size: 16px;
            color: rgb(150, 143, 143);
        }

        .description-text{
            font-size: 16px;
            width: 300px;
        }

        .starting-btn{
            color: white;
            background-color: rgb(7, 129, 7);
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <p class="tittle-text">HTML CSS Course</p>
    <p class="subtittle-text">Beginner to Pro</p>
    <p class="description-text">In this course, we'll learn the skills you need ro become a Developer</p>
    <button class="starting-btn">Get Started</button>
</body>
</html>
