<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arial Font</title>
    <style>
        p{
            font-family: Arial;
            margin-top: 0;
        }

        .bold-text{
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .center-text{
            text-align: center;
        }

        .blue-clr{
            color: blue;
            text-align: center;
        }

    </style>
</head>
<body>
    <p class="bold-text">Shopping for your business?</p>
    <p class="center-text">See how Apple at Work can help </p>
    <p class="blue-clr">Learn more &#62;</p>

</body>
</html>
