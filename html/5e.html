<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBook Pro</title>
    <style>
        p{
            font-family: Arial;
            margin-bottom: 0;
            margin-top: 5px;
        }
        .orange-color{
            color: orange;
            text-align: center;
            font-weight: bold;
        }

        .product-name{
            font-weight: bold;
            font-size: 20px;
            text-align: center; 
        }

        .product-description{
            font-size: 30px;
            font-weight: bold;
            text-align: center;
        }

        .price-tag{
            color: rgb(116, 112, 112);
            text-align: center;
            margin-bottom: 10px;
        }

        .buy-btn{
            color: white;
            background-color: blue;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            text-align: center;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <p class="orange-color">New</p>
    <p class="product-name">MacBook Pro</p>
    <p class="product-description">Supercharged for Pros.</p>
    <p class="price-tag">From $1999</p>
    <button class="buy-btn">Buy</button>
</body>
</html>
