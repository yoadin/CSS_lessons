<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
        #subscribe-button{
            background-color: red;
            border: none;
            height: 35px;
            width: 100px;
            color: white;
            font-style: bold;
            border-radius: 2px;
            cursor: pointer;
            margin-right: 6px;
        }
        #join-button{
            background-color: white;
            border-color: rgb(61, 193, 229);
            border-width: 2px;
            border-style: solid;
            height: 35px;
            width: 75px;
            color: rgb(37, 163, 231);
            font-style: bold;
            border-radius: 4px;
            margin-right: 6px;
        }
        #tweet-button{
            background-color: rgb(61, 161, 242);
            border: none;
            height: 35px;
            width: 100px;
            color: white;
            font-style: bold;
            font-size: 16px;
            border-radius: 18px;
        }
    </style>
</head>
<body>
    <button id="subscribe-button">SUBSCRIBE</button>
    <button id="join-button">Join</button>
    <button id="tweet-button">Tweet</button>
</body>
</html>
